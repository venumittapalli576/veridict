# Veridict verifies itself. This is the config its own CI uses.
commands:
  tests: "pytest -q"
  build: null
  lint: "ruff check ."
  typecheck: null

checks:
  no_secrets: true
  # Off for this repo only: the scanner's own pattern definitions and test
  # fixtures necessarily contain the marker strings it hunts for.
  no_new_todos: false

required:
  - tests

timeout: 300
